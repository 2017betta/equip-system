<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betta Inline Skate Club｜裝備平台</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#add8e6;
  color:black;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#0096c7;
  color:white;
}
.login-btn,.logout-btn{
  background:white;
  color:#0b3d91;
  border:none;
  padding:10px 18px;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  margin-left:8px;
}
.section{
  padding:60px 20px;
  text-align:center;
}
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
.hero-left,.hero-right{
  flex:1;
  min-width:260px;
  padding:20px;
  text-align:center;
}
.hero-right img{
  max-width:80%;
  height:auto;
  border-radius:12px;
}
.gallery img{
  width:260px;
  margin:12px;
  border-radius:12px;
}
.fb-btn{
  background:#0077b6;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.big-btn,.small-btn{
  padding:14px 24px;
  margin:10px;
  font-size:18px;
  background:#0b3d91;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.small-btn{
  background:white;
  color:#0b3d91;
  border:1px solid #0b3d91;
}
input,select{
  padding:10px;
  font-size:16px;
  margin:8px;
  border-radius:6px;
  border:1px solid #999;
}
table{
  margin:20px auto;
  border-collapse:collapse;
  background:white;
  width:90%;
  max-width:950px;
}
td,th{
  border:1px solid #999;
  padding:8px 12px;
  text-align:center;
}
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:20;
}
.modal-box{
  background:white;
  margin:18% auto;
  padding:20px;
  width:300px;
  border-radius:10px;
  text-align:center;
}
.modal-box input{
  width:80%;
}
#platform{
  display:none;
  padding:20px;
}
.panel{
  display:none;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.95);
  border-radius:12px;
  width:90%;
  max-width:1000px;
}
.label-sheet{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:20px;
}
.label{
  border:1px solid #000;
  background:white;
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:14px;
  padding:8px;
}
.barcode-text{
  font-family:monospace;
  letter-spacing:1px;
  font-size:12px;
  margin-top:6px;
  word-break:break-all;
}
.note{
  font-size:14px;
  color:#444;
}
.sub-box{
  margin:15px auto;
  padding:15px;
  background:#f7fbff;
  border:1px solid #b9d7ec;
  border-radius:10px;
  max-width:900px;
}
#reader{
  width:320px;
  margin:20px auto;
}
@media print{
  header,.no-print,.modal,.section,#stockArea,#logArea,#mainButtons{
    display:none !important;
  }
  body{
    background:white;
  }
  #platform{
    display:block !important;
    padding:0 !important;
  }
  #stockInPanel{
    display:block !important;
    width:100% !important;
    max-width:none !important;
    margin:0 !important;
    padding:0 !important;
    background:white !important;
    border:none !important;
  }
  #labels{
    display:grid !important;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    padding:0;
  }
}
</style>
</head>
<body>

<!-- 官網首頁 -->
<div id="publicSite">
  <header>
    <h2>Betta Inline Skate Club</h2>
    <div>
      <button id="topLoginBtn" class="login-btn" onclick="openLogin()">登入</button>
      <button id="topLogoutBtn" class="logout-btn" onclick="logout()" style="display:none;">登出</button>
    </div>
  </header>

  <div class="section hero">
    <div class="hero-left">
      <h1>鬥魚直排輪俱樂部</h1>
      <p style="font-size:18px;">專業直排輪教學｜競速訓練｜活動推廣</p>
    </div>
    <div class="hero-right">
      <img src="https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/489273120_1158160336323914_4604643340299191214_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=2a1932&_nc_ohc=4tb2Q1eRKiMQ7kNvwExyLxP&_nc_oc=AdojpYWHiGp8sWkLYtxKTPltRg-64wxWt0Prsbs_LRuYQcVpIq-j6nBmTHyCfDM-z1o&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=Cw4JR0LFozvt3FdCpuXkjA&_nc_ss=7a32e&oh=00_Afz5DPyVYjNyr1Rvy4DZi1jPeTCc09lLppYbosjIn9eaNw&oe=69C88C7A">
    </div>
  </div>

  <div class="section" style="background:#90e0ef;">
    <h2>近期活動照片</h2>
    <div class="gallery">
      <img src="https://picsum.photos/300/200?1">
      <img src="https://picsum.photos/300/200?2">
      <img src="https://picsum.photos/300/200?3">
    </div>
  </div>

  <div class="section">
    <h2>官方粉絲專頁</h2>
    <a href="https://www.facebook.com/BettaInlineSkateClub" target="_blank">
      <button class="fb-btn">前往FB</button>
    </a>
  </div>
</div>

<!-- 登入視窗 -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <h3>教練登入</h3>
    <input type="text" id="accountInput" placeholder="帳號，例如 jerry">
    <br>
    <input type="password" id="modalPass" placeholder="輸入密碼">
    <br>
    <button class="big-btn" onclick="login()">登入</button>
    <button class="small-btn" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- 裝備平台 -->
<div id="platform">
  <h2>裝備平台</h2>
  <h3 id="welcome"></h3>

  <div id="mainButtons" class="no-print">
    <button class="big-btn" onclick="openStockIn()">📦 進貨</button>
    <button class="big-btn" onclick="openStockOut()">📤 出貨</button>
    <button class="big-btn" onclick="openAddItem()">➕ 新增商品</button>
    <button class="big-btn" onclick="showStock()">📋 查看庫存</button>
    <button class="big-btn" onclick="exportExcel()">💾 匯出 Excel</button>
    <button class="big-btn" onclick="logout()">🚪 登出</button>
  </div>

  <!-- 進貨 -->
  <div id="stockInPanel" class="panel">
    <h3 class="no-print">📦 進貨管理</h3>

    <div class="sub-box no-print">
      <h4>1. 選擇商品</h4>
      <div id="productButtons"></div>

      <div id="sizePanel" style="display:none;margin-top:20px;">
        <h4>2. 選擇尺寸</h4>
        <button class="small-btn" onclick="chooseSize('XS')">XS</button>
        <button class="small-btn" onclick="chooseSize('S')">S</button>
        <button class="small-btn" onclick="chooseSize('M')">M</button>
        <button class="small-btn" onclick="chooseSize('L')">L</button>
        <button class="small-btn" onclick="chooseSize('XL')">XL</button>
        <button class="small-btn" onclick="chooseSize('F')">FREE</button>
      </div>

      <div id="qtyPanel" style="display:none;margin-top:20px;">
        <h4>3. 輸入數量</h4>
        <input type="number" id="inQty" min="1" value="1" placeholder="數量">
        <button class="big-btn" onclick="generateStockInBatch()">確認進貨並產生貼紙</button>
      </div>
    </div>

    <h3 id="result"></h3>

    <div id="printActions" class="no-print" style="display:none;">
      <button class="big-btn" onclick="window.print()">🖨️ 列印貼紙</button>
    </div>

    <div id="labels" class="label-sheet"></div>
  </div>

  <!-- 出貨 -->
  <div id="stockOutPanel" class="panel no-print">
    <h3>📤 出貨</h3>
    <input id="outCode" placeholder="輸入條碼，例如 MH-XS0001">
    <button class="big-btn" onclick="stockOut()">手動出貨</button>
    <hr>
    <h4>📱 手機掃描 QR code / 條碼出貨</h4>
    <div id="reader"></div>
    <button class="big-btn" onclick="startScanner()">開始掃描</button>
    <button class="big-btn" onclick="stopScanner()">停止掃描</button>
    <p class="note">建議用 HTTPS 網址開啟，並允許相機權限。</p>
  </div>

  <!-- 新增商品 -->
  <div id="addItemPanel" class="panel no-print">
    <h3>➕ 新增商品</h3>
    <input id="newItemName" placeholder="商品名稱，例如 梅花帽">
    <input id="newItemCode" placeholder="商品簡碼，例如 MH">
    <button class="big-btn" onclick="addNewItem()">新增商品</button>
    <p class="note">只有佳祐可以新增商品。簡碼請用英文大寫，例如 MH / GL / SK。</p>
  </div>

  <!-- 庫存 -->
  <div id="stockArea" class="panel"></div>

  <!-- 出貨紀錄 -->
  <div id="logArea" class="panel"></div>
</div>
