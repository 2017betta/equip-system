<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>測試登入</title>

<style>
body{font-family:Arial;text-align:center;padding:50px}
button{padding:15px 25px;margin:10px;font-size:18px}
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}
.box{
  background:white;
  padding:20px;
  margin:20% auto;
  width:300px;
}
</style>
</head>

<body>

<h2>選擇登入</h2>

<button onclick="selectCoach('jerry')">佳祐</button>
<button onclick="selectCoach('msmdick')">土豆</button>

<div id="modal" class="modal">
  <div class="box">
    <h3 id="title"></h3>
    <input id="pw" type="password" placeholder="密碼">
    <br><br>
    <button onclick="login()">登入</button>
  </div>
</div>

<script>
const users = {
  jerry:{password:"0606",name:"佳祐"},
  msmdick:{password:"1111",name:"土豆"}
};

let current="";

function selectCoach(key){
  current = key;
  document.getElementById("title").innerText = users[key].name;
  document.getElementById("modal").style.display = "block";
}

function login(){
  const pw = document.getElementById("pw").value;

  if(users[current].password === pw){
    alert("登入成功");
  }else{
    alert("錯誤");
  }
}
</script>

</body>
</html>
