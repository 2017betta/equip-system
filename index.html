<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裝備平台</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#d9f1ff;
  color:#111;
}
.topbar{
  background:#0b3d91;
  color:white;
  padding:18px;
  font-size:28px;
  font-weight:bold;
  text-align:center;
}
button{
  border:none;
  border-radius:14px;
  cursor:pointer;
}
.big-btn{
  background:#0b3d91;
  color:white;
  padding:18px 26px;
  margin:10px;
  font-size:22px;
  min-width:170px;
}
.small-btn,.coach-btn{
  background:white;
  color:#0b3d91;
  border:2px solid #0b3d91;
  padding:14px 20px;
  margin:8px;
  font-size:20px;
}
.panel{
  display:none;
  margin:20px auto;
  padding:24px;
  background:white;
  border-radius:18px;
  width:min(96vw,1100px);
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
input,select{
  padding:14px 16px;
  font-size:20px;
  margin:10px;
  border-radius:10px;
  border:2px solid #b9c7d5;
  width:min(80vw,360px);
  box-sizing:border-box;
}
#mainButtons{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin:18px auto;
  width:min(96vw,1100px);
}
#productButtons,#sizePanel{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:20px;
  font-size:18px;
}
td,th{
  border:1px solid #cfd8e3;
  padding:12px;
  text-align:center;
}
.label-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:10px 0;
}
.label{
  border:1px solid #222;
  border-radius:8px;
  min-height:180px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
  background:white;
  font-size:18px;
}
#readerIn,#readerOut{
  width:min(92vw,420px);
  margin:20px auto;
}
.warn{color:#c62828;font-weight:bold}
.ok{color:#2e7d32;font-weight:bold}
.note{font-size:14px;color:#444}
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  z-index:30;
}
.modal-box{
  background:white;
  margin:14% auto;
  padding:20px;
  width:min(90vw,340px);
  border-radius:14px;
  text-align:center;
}

/* iPad 大字模式 */
.big-mode{
  font-size:1.15em;
}
.big-mode .big-btn,
.big-mode .small-btn,
.big-mode .coach-btn,
.big-mode button{
  font-size:24px !important;
  padding:18px 28px !important;
}
.big-mode input,
.big-mode select{
  font-size:22px !important;
  padding:16px !important;
}
.big-mode table{
  font-size:22px !important;
}
.big-mode .topbar{
  font-size:30px !important;
}
.big-mode #readerIn,
.big-mode #readerOut{
  width:420px !important;
}

@media (max-width:900px){
  .label-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:600px){
  .label-grid{grid-template-columns:1fr}
}
@media print{
  .topbar,.no-print,.modal,#mainButtons,#stockPanel,#logPanel,#reportPanel{
    display:none !important;
  }
  body{background:white}
  #inPanel{
    display:block !important;
    width:100% !important;
    max-width:none !important;
    margin:0 !important;
    padding:0 !important;
    border:none !important;
    box-shadow:none !important;
  }
  #labels{
    display:grid !important;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    padding:0;
  }
}
</style>
</head>
<body>

<div class="topbar">裝備平台</div>

<!-- 登入 -->
<div id="loginArea" class="panel" style="display:block">
  <h2>選擇教練登入</h2>
  <button class="coach-btn" onclick="selectCoach('jerry')">佳祐</button>
  <button class="coach-btn" onclick="selectCoach('msmdick')">土豆教練</button>
  <button class="coach-btn" onclick="selectCoach('h072012')">小宇教練</button>
  <button class="coach-btn" onclick="selectCoach('zemo')">阿澤教練</button>
  <button class="coach-btn" onclick="selectCoach('ma')">小馬教練</button>
  <button class="coach-btn" onclick="selectCoach('chuu')">莉筑教練</button>
</div>

<div id="pwModal" class="modal">
  <div class="modal-box">
    <h3 id="pwTitle">輸入密碼</h3>
    <input type="password" id="pwInput" placeholder="密碼">
    <br>
    <button class="big-btn" onclick="login()">登入</button>
    <button class="small-btn" onclick="closePwModal()">取消</button>
  </div>
</div>

<div id="main" style="display:none">
  <h2 id="who" style="text-align:center"></h2>

  <div id="mainButtons" class="no-print">
    <button class="big-btn" onclick="openIn()">📦 進貨</button>
    <button class="big-btn" onclick="openOut()">📤 出貨</button>
    <button class="big-btn" onclick="openAdd()">➕ 新增商品</button>
    <button class="big-btn" onclick="showStock()">📋 庫存</button>
    <button class="big-btn" onclick="showReport()">📊 POS報表</button>
    <button class="big-btn" onclick="toggleBigMode()">🔍 iPad大字模式</button>
    <button class="big-btn" onclick="exportExcel()">📁 Excel</button>
    <button class="big-btn" onclick="exportStatisticExcel()">🗓️ 月年統計</button>
    <button class="big-btn" onclick="logout()">🚪 登出</button>
  </div>

  <!-- 進貨 -->
  <div id="inPanel" class="panel">
    <h3 class="no-print">📦 進貨</h3>

    <div class="no-print">
      <h4>方式 1：批量新增新品</h4>
      <div id="productButtons"></div>

      <div id="sizePanel" style="display:none">
        <button class="small-btn" onclick="setSize('XS')">XS</button>
        <button class="small-btn" onclick="setSize('S')">S</button>
        <button class="small-btn" onclick="setSize('M')">M</button>
        <button class="small-btn" onclick="setSize('L')">L</button>
        <button class="small-btn" onclick="setSize('XL')">XL</button>
        <button class="small-btn" onclick="setSize('F')">FREE</button>
      </div>

      <div id="qtyBox" style="display:none">
        <input id="qty" type="number" value="1" min="1" placeholder="數量">
        <button class="big-btn" onclick="batchIn()">確認進貨並產生貼紙</button>
      </div>
    </div>

    <div class="no-print">
      <hr>
      <h4>方式 2：掃描進貨（既有條碼回庫）</h4>
      <input id="inCode" placeholder="輸入條碼，例如 MH-XS0001">
      <button class="big-btn" onclick="manualIn()">手動回庫</button>
      <div id="readerIn"></div>
      <button class="big-btn" onclick="scanIn()">開始掃描進貨</button>
      <button class="big-btn" onclick="stopScanIn()">停止掃描進貨</button>
      <div class="note">這個功能是把已存在的條碼重新放回庫存。</div>
    </div>

    <h3 id="result"></h3>
    <button class="big-btn no-print" onclick="window.print()">🖨️ 列印貼紙</button>

    <div id="labels" class="label-grid"></div>
  </div>

  <!-- 出貨 -->
  <div id="outPanel" class="panel">
    <h3>📤 出貨</h3>
    <input id="outCode" placeholder="輸入條碼，例如 MH-XS0001">
    <button class="big-btn" onclick="outItem()">手動出貨</button>

    <div id="readerOut"></div>
    <button class="big-btn" onclick="scanOut()">開始掃描出貨</button>
    <button class="big-btn" onclick="stopScanOut()">停止掃描出貨</button>
  </div>

  <!-- 新增商品 -->
  <div id="addPanel" class="panel">
    <h3>➕ 新增商品</h3>
    <input id="name" placeholder="名稱">
    <input id="code" placeholder="簡碼">
    <button class="big-btn" onclick="add()">新增</button>
  </div>

  <!-- 庫存 -->
  <div id="stockPanel" class="panel"></div>

  <!-- 紀錄 -->
  <div id="logPanel" class="panel"></div>

  <!-- 報表 -->
  <div id="reportPanel" class="panel">
    <h3>📊 POS 報表中心</h3>
    <div style="margin-bottom:20px;">
      <button class="small-btn" onclick="drawMonthlyChart()">月統計</button>
      <button class="small-btn" onclick="drawYearlyChart()">年統計</button>
    </div>
    <div style="max-width:900px;margin:auto;">
      <canvas id="reportChart"></canvas>
    </div>
    <div id="reportSummary" style="margin-top:20px;"></div>
  </div>
</div>

<script>
var users = {
  "jerry": { password: "0606", name: "佳祐" },
  "msmdick": { password: "1111", name: "土豆教練" },
  "h072012": { password: "2222", name: "小宇教練" },
  "zemo": { password: "3333", name: "阿澤教練" },
  "ma": { password: "5555", name: "小馬教練" },
  "chuu": { password: "6666", name: "莉筑教練" }
};

var products = {
  "MH": "梅花帽",
  "GL": "護具",
  "SK": "直排輪鞋"
};

var stock = {};
var logs = [];
var counter = {};

var user = "";
var admin = false;
var currentLoginKey = "";
var pc = "", pn = "", ps = "";
var scannerInObj = null;
var scannerOutObj = null;
var reportChart = null;
const LOW_STOCK_LIMIT = 3;

// 登入
function selectCoach(key){
  currentLoginKey = key;
  document.getElementById("pwTitle").innerText = "登入 - " + users[key].name;
  document.getElementById("pwInput").value = "";
  document.getElementById("pwModal").style.display = "block";
}
function closePwModal(){
  document.getElementById("pwModal").style.display = "none";
  currentLoginKey = "";
}
function login(){
  const pw = document.getElementById("pwInput").value;
  if(!currentLoginKey || !users[currentLoginKey]) return alert("請先選擇教練");
  if(users[currentLoginKey].password !== pw) return alert("密碼錯誤");

  user = users[currentLoginKey].name;
  admin = (currentLoginKey === "jerry");

  document.getElementById("pwModal").style.display = "none";
  document.getElementById("loginArea").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("who").innerText = "歡迎 " + user;

  renderProducts();
}
function logout(){
  stopScanIn();
  stopScanOut();
  location.reload();
}

// 商品按鈕
function renderProducts(){
  let h = "";
  for(let k in products){
    h += <button class="small-btn" onclick="pickProduct('${k}','${products[k]}')">${products[k]}</button>;
  }
  document.getElementById("productButtons").innerHTML = h;
}

function hidePanels(){
  ["inPanel","outPanel","stockPanel","addPanel","logPanel","reportPanel"].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = "none";
  });
  if(document.getElementById("sizePanel")) document.getElementById("sizePanel").style.display = "none";
  if(document.getElementById("qtyBox")) document.getElementById("qtyBox").style.display = "none";
  if(document.getElementById("result")) document.getElementById("result").innerHTML = "";
}

function openIn(){
  if(!admin) return alert("只有佳祐可以進貨");
  hidePanels();
  document.getElementById("inPanel").style.display = "block";
}
function openOut(){
  hidePanels();
  document.getElementById("outPanel").style.display = "block";
}
function openAdd(){
  if(!admin) return alert("只有佳祐可以新增商品");
  hidePanels();
  document.getElementById("addPanel").style.display = "block";
}
function showReport(){
  hidePanels();
  document.getElementById("reportPanel").style.display = "block";
  drawMonthlyChart();
}

function pickProduct(code,name){
  pc = code;
  pn = name;
  document.getElementById("sizePanel").style.display = "flex";
}
function setSize(size){
  ps = size;
  document.getElementById("qtyBox").style.display = "block";
}

async function batchIn(){
  const q = parseInt(document.getElementById("qty").value || "0", 10);
  if(!pc || !ps || !q || q < 1) return alert("請先選商品、尺寸、數量");

  const key = pc + "-" + ps;
  if(!counter[key]) counter[key] = 1;

  const labels = document.getElementById("labels");
  labels.innerHTML = "";

  for(let i=0;i<q;i++){
    const num = String(counter[key]).padStart(4, "0");
    const code = pc + "-" + ps + num;

    stock[code] = {
      name: pn,
      productName: pn,
      size: ps,
      productCode: pc,
      status: "in",
      inTime: new Date().toLocaleString()
    };

    const div = document.createElement("div");
    div.className = "label";
    const safeId = "bc" + code.replace(/[^a-zA-Z0-9]/g,"");
    div.innerHTML = `
      <b>${pn}</b>
      <div>${ps}</div>
      <svg id="${safeId}"></svg>
      <div class="barcode-text">${code}</div>
    `;
    labels.appendChild(div);

    JsBarcode("#" + safeId, code, {
      format: "CODE128",
      displayValue: false,
      width: 1.5,
      height: 45,
      margin: 2
    });

    counter[key]++;
  }

  document.getElementById("result").innerText = "進貨完成";
  await notifyLowStock();
}

// 掃描進貨
async function manualIn(){
  const code = document.getElementById("inCode").value.trim().toUpperCase();
  await processIn(code);
}
async function processIn(code){
  if(!admin) return alert("只有佳祐可以進貨");
  if(!stock[code]) return alert("此條碼不存在，不能掃描回庫");
  stock[code].status = "in";
  stock[code].inTime = new Date().toLocaleString();
  document.getElementById("inCode").value = "";
  await notifyLowStock();
  alert("已進貨：" + code);
}
function scanIn(){
  if(scannerInObj) stopScanIn();
  scannerInObj = new Html5Qrcode("readerIn");
  scannerInObj.start(
    { facingMode:"environment" },
    { fps:10, qrbox:220 },
    async txt => {
      stopScanIn();
      await processIn(txt.trim().toUpperCase());
    },
    () => {}
  ).catch(() => alert("無法開啟相機"));
}
function stopScanIn(){
  if(scannerInObj){
    scannerInObj.stop().then(()=>{
      scannerInObj.clear();
      scannerInObj = null;
    }).catch(()=>{
      scannerInObj = null;
    });
  }
}

// 出貨
async function outItem(){
  const c = document.getElementById("outCode").value.trim().toUpperCase();
  await processOut(c);
}
async function processOut(c){
  if(!stock[c]) return alert("無此條碼");
  if(stock[c].status === "out") return alert("這件已出貨");

  const item = stock[c];
  stock[c].status = "out";

  logs.push({
    user: user,
    product: item.name,
    size: item.size,
    code: c,
    time: new Date().toLocaleString()
  });

  document.getElementById("outCode").value = "";
  await notifyLowStock();
  alert("出貨成功");
}
function scanOut(){
  if(scannerOutObj) stopScanOut();
  scannerOutObj = new Html5Qrcode("readerOut");
  scannerOutObj.start(
    { facingMode:"environment" },
    { fps:10, qrbox:220 },
    async txt => {
      stopScanOut();
      await processOut(txt.trim().toUpperCase());
    },
    () => {}
  ).catch(() => alert("無法開啟相機"));
}
function stopScanOut(){
  if(scannerOutObj){
    scannerOutObj.stop().then(()=>{
      scannerOutObj.clear();
      scannerOutObj = null;
    }).catch(()=>{
      scannerOutObj = null;
    });
  }
}

// 庫存顯示
function showStock(){
  hidePanels();
  document.getElementById("stockPanel").style.display = "block";
  document.getElementById("logPanel").style.display = "block";

  const summary = {};

  for(const code in stock){
    const item = stock[code];
    const key = item.name + "__" + item.size;

    if(!summary[key]){
      summary[key] = {
        name: item.name,
        size: item.size,
        in: 0,
        out: 0
      };
    }

    if(item.status === "in") summary[key].in++;
    else summary[key].out++;
  }

  let left = "<h3>📤 出貨數量</h3>";
  left += "<table><tr><th>物品</th><th>尺寸</th><th>出貨數量</th></tr>";
  for(const key in summary){
    const s = summary[key];
    left += <tr><td>${s.name}</td><td>${s.size}</td><td>${s.out}</td></tr>;
  }
  if(Object.keys(summary).length === 0){
    left += <tr><td colspan="3">目前沒有資料</td></tr>;
  }
  left += "</table>";

  let right = "<h3>📦 目前庫存</h3>";
  right += "<table><tr><th>物品</th><th>尺寸</th><th>庫存</th><th>警告</th></tr>";
  for(const key in summary){
    const s = summary[key];
    const warn = s.in <= LOW_STOCK_LIMIT ? "⚠️低庫存" : "";
    right += <tr><td>${s.name}</td><td>${s.size}</td><td>${s.in}</td><td>${warn}</td></tr>;
  }
  if(Object.keys(summary).length === 0){
    right += <tr><td colspan="4">目前沒有庫存</td></tr>;
  }
  right += "</table>";

  document.getElementById("stockPanel").innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center">
      <div style="flex:1;min-width:320px">${left}</div>
      <div style="flex:1;min-width:320px">${right}</div>
    </div>
  `;

  let logHtml = "<h3>📝 出貨紀錄</h3><table><tr><th>出貨教練</th><th>物品</th><th>尺寸</th><th>條碼</th><th>時間</th></tr>";
  logs.forEach(l=>{
    logHtml += <tr><td>${l.user}</td><td>${l.product}</td><td>${l.size}</td><td>${l.code}</td><td>${l.time}</td></tr>;
  });
  if(logs.length === 0){
    logHtml += <tr><td colspan="5">目前沒有出貨紀錄</td></tr>;
  }
  logHtml += "</table>";
  document.getElementById("logPanel").innerHTML = logHtml;
}

// 新增商品
function add(){
  const n = document.getElementById("name").value.trim();
  const c = document.getElementById("code").value.trim().toUpperCase();
  if(!n || !c) return alert("請輸入完整");
  products[c] = n;
  document.getElementById("name").value = "";
  document.getElementById("code").value = "";
  renderProducts();
  alert("新增完成");
}

// POS 報表
function getMonthlyStats(){
  const monthly = {};
  logs.forEach(log=>{
    const d = new Date(log.time);
    const key = ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")};
    if(!monthly[key]) monthly[key] = 0;
    monthly[key]++;
  });
  return monthly;
}
function getYearlyStats(){
  const yearly = {};
  logs.forEach(log=>{
    const d = new Date(log.time);
    const key = ${d.getFullYear()};
    if(!yearly[key]) yearly[key] = 0;
    yearly[key]++;
  });
  return yearly;
}
function drawMonthlyChart(){
  const stats = getMonthlyStats();
  const labels = Object.keys(stats).sort();
  const values = labels.map(k => stats[k]);

  if(reportChart) reportChart.destroy();

  const ctx = document.getElementById("reportChart").getContext("2d");
  reportChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{ label: "每月出貨數量", data: values }]
    },
    options: { responsive: true }
  });

  document.getElementById("reportSummary").innerHTML =
    "<h4>📅 月統計摘要</h4>" +
    (labels.length ? labels.map((k,i)=>`${k}：${values[i]} 件`).join("<br>") : "目前沒有資料");
}
function drawYearlyChart(){
  const stats = getYearlyStats();
  const labels = Object.keys(stats).sort();
  const values = labels.map(k => stats[k]);

  if(reportChart) reportChart.destroy();

  const ctx = document.getElementById("reportChart").getContext("2d");
  reportChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{ label: "每年出貨數量", data: values, fill:false, tension:0.2 }]
    },
    options: { responsive: true }
  });

  document.getElementById("reportSummary").innerHTML =
    "<h4>🗓️ 年統計摘要</h4>" +
    (labels.length ? labels.map((k,i)=>`${k}：${values[i]} 件`).join("<br>") : "目前沒有資料");
}

// 匯出
function exportExcel(){
  const data = [["條碼","名稱","尺寸","狀態"]];
  for(const k in stock){
    const i = stock[k];
    data.push([k, i.name, i.size, i.status]);
  }

  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "庫存");
  XLSX.writeFile(wb, "庫存.xlsx");
}
function exportStatisticExcel(){
  const monthly = getMonthlyStats();
  const yearly = getYearlyStats();

  const monthlyData = [["月份","出貨數量"]];
  Object.keys(monthly).sort().forEach(k => monthlyData.push([k, monthly[k]]));

  const yearlyData = [["年份","出貨數量"]];
  Object.keys(yearly).sort().forEach(k => yearlyData.push([k, yearly[k]]));

  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(monthlyData);
  XLSX.utils.book_append_sheet(wb, ws1, "月統計");
  const ws2 = XLSX.utils.aoa_to_sheet(yearlyData);
  XLSX.utils.book_append_sheet(wb, ws2, "年統計");

  XLSX.writeFile(wb, "月年統計報表.xlsx");
}

// iPad 大字模式
function toggleBigMode(){
  document.body.classList.toggle("big-mode");
}

// 低庫存通知（沿用前面接口）
function getLowStockItems(){
  const summary = {};
  for(const code in stock){
    const item = stock[code];
    if(item.status !== "in") continue;
    const key = ${item.name}__${item.size};
    if(!summary[key]){
      summary[key] = { name:item.name, size:item.size, count:0 };
    }
    summary[key].count++;
  }
  return Object.values(summary).filter(item => item.count <= LOW_STOCK_LIMIT);
}
async function notifyLowStock(){
  const lowItems = getLowStockItems();
  if(!lowItems.length) return;
  try{
    await fetch("/api/low-stock-alert", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        triggeredBy: user || "系統",
        items: lowItems
      })
    });
  }catch(err){
    console.error("低庫存通知失敗", err);
  }
}
