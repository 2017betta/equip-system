<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裝備平台</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#d9f1ff;text-align:center}
.topbar{background:#0b3d91;color:white;padding:16px;font-size:28px}
.panel{background:white;width:min(92vw,900px);margin:24px auto;padding:24px;border-radius:16px}
button{padding:12px 18px;margin:6px;font-size:18px;border-radius:10px;border:none;cursor:pointer}
.primary{background:#0b3d91;color:white}
.secondary{background:white;border:2px solid #0b3d91;color:#0b3d91}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999}
.box{background:white;padding:20px;margin:15% auto;width:300px;border-radius:12px}
.section{display:none;margin-top:20px}
.label{border:1px solid #000;margin:10px;padding:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{border:1px solid #ccc;padding:8px}
</style>
</head>

<body>

<div class="topbar">裝備平台</div>

<!-- 登入 -->
<div id="loginArea" class="panel">
  <h2>登入</h2>
  <button class="secondary" onclick="selectCoach('jerry')">佳祐</button>
  <button class="secondary" onclick="selectCoach('msmdick')">土豆</button>
</div>

<div id="modal" class="modal">
  <div class="box">
    <h3 id="title"></h3>
    <input id="pw" type="password"><br><br>
    <button onclick="login()">登入</button>
    <button onclick="closeModal()">取消</button>
  </div>
</div>

<!-- 主畫面 -->
<div id="main" class="panel" style="display:none">
  <h2 id="welcome"></h2>

  <button onclick="openSection('inSection')">📦進貨</button>
  <button onclick="openSection('outSection')">📤出貨</button>
  <button onclick="openSection('stockSection')">📋庫存</button>
  <button onclick="logout()">🚪登出</button>

  <!-- 進貨 -->
  <div id="inSection" class="section">
    <h3>進貨</h3>

    <button onclick="selectProduct('MH','梅花帽')">梅花帽</button>
    <button onclick="selectProduct('GL','護具')">護具</button>

    <div id="sizeArea" style="display:none">
      <button onclick="setSize('XS')">XS</button>
      <button onclick="setSize('S')">S</button>
    </div>

    <div id="qtyArea" style="display:none">
      <input id="qty" type="number" value="1"><br>
      <button onclick="generate()">產生條碼</button>
    </div>

    <div id="result"></div>
  </div>

  <!-- 出貨 -->
  <div id="outSection" class="section">
    <h3>出貨</h3>
    <input id="outCode" placeholder="輸入條碼">
    <button onclick="outItem()">出貨</button>
  </div>

  <!-- 庫存 -->
  <div id="stockSection" class="section"></div>

</div>

<script>
// 使用者
const users={
  jerry:{password:"0606",name:"佳祐"},
  msmdick:{password:"1111",name:"土豆"}
};

let current="",isAdmin=false;
let pCode="",pName="",size="";
let counter={};

// 庫存＆紀錄
let stock={};
let logs=[];

// ===== 登入 =====
function selectCoach(k){
  current=k;
  document.getElementById("title").innerText=users[k].name;
  document.getElementById("modal").style.display="block";
}

function login(){
  let pw=document.getElementById("pw").value;
  if(users[current].password!=pw)return alert("錯誤");

  isAdmin=(current==="jerry");

  document.getElementById("loginArea").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("welcome").innerText="歡迎 "+users[current].name;

  closeModal();
}

// ===== 登出 =====
function logout(){
  current="";
  isAdmin=false;

  document.getElementById("main").style.display="none";
  document.getElementById("loginArea").style.display="block";

  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
}

// ===== modal =====
function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("pw").value="";
}

// ===== 切頁 =====
function openSection(id){
  document.querySelectorAll(".section").forEach(x=>x.style.display="none");

  if(id==="inSection" && !isAdmin){
    alert("只有佳祐可以進貨");
    return;
  }

  if(id==="stockSection"){
    showStock();
  }

  document.getElementById(id).style.display="block";
}

// ===== 進貨 =====
function selectProduct(c,n){
  pCode=c;pName=n;
  document.getElementById("sizeArea").style.display="block";
}

function setSize(s){
  size=s;
  document.getElementById("qtyArea").style.display="block";
}

function generate(){
  let q=parseInt(document.getElementById("qty").value);
  let key=pCode+"-"+size;

  if(!counter[key]) counter[key]=1;

  let result=document.getElementById("result");
  result.innerHTML="";

  for(let i=0;i<q;i++){
    let num=String(counter[key]).padStart(4,"0");
    let code=pCode+"-"+size+num;

    stock[code]={name:pName,size:size,status:"in"};

    let div=document.createElement("div");
    div.className="label";
    div.innerHTML=`${pName}<br>${size}<br><svg id="bc${code}"></svg><br>${code}`;
    result.appendChild(div);

    JsBarcode("#bc"+code,code);

    counter[key]++;
  }
}

// ===== 出貨 =====
function outItem(){
  let code=document.getElementById("outCode").value;

  if(!stock[code]) return alert("找不到");

  if(stock[code].status==="out") return alert("已出貨");

  stock[code].status="out";

  logs.push({
    user:users[current].name,
    code:code
  });

  alert("出貨成功");
}

// ===== 庫存 =====
function showStock(){
  let html="<h3>庫存</h3><table><tr><th>物品</th><th>尺寸</th><th>在庫</th><th>出貨</th></tr>";

  let summary={};

  for(let c in stock){
    let i=stock[c];
    let key=i.name+i.size;

    if(!summary[key]){
      summary[key]={name:i.name,size:i.size,in:0,out:0};
    }

    if(i.status==="in") summary[key].in++;
    else summary[key].out++;
  }

  for(let k in summary){
    let s=summary[k];
    html+=`<tr><td>${s.name}</td><td>${s.size}</td><td>${s.in}</td><td>${s.out}</td></tr>`;
  }

  html+="</table>";

  document.getElementById("stockSection").innerHTML=html;
}
</script>

</body>
</html>
