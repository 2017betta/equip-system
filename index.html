<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betta Inline Skate Club｜裝備平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#add8e6;
  color:black;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#0096c7;
  color:white;
}
.login-btn,.logout-btn{
  background:white;
  color:#0b3d91;
  border:none;
  padding:10px 18px;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  margin-left:8px;
}
.section{
  padding:60px 20px;
  text-align:center;
}
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
.hero-left,.hero-right{
  flex:1;
  min-width:260px;
  padding:20px;
  text-align:center;
}
.hero-right img{
  max-width:80%;
  height:auto;
  border-radius:12px;
}
.gallery img{
  width:260px;
  margin:12px;
  border-radius:12px;
}
.fb-btn{
  background:#0077b6;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.big-btn,.small-btn{
  padding:14px 24px;
  margin:10px;
  font-size:18px;
  background:#0b3d91;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.small-btn{
  background:white;
  color:#0b3d91;
  border:1px solid #0b3d91;
}
input,select{
  padding:10px;
  font-size:16px;
  margin:8px;
  border-radius:6px;
  border:1px solid #999;
}
table{
  margin:20px auto;
  border-collapse:collapse;
  background:white;
  width:90%;
  max-width:950px;
}
td,th{
  border:1px solid #999;
  padding:8px 12px;
  text-align:center;
}
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:20;
}
.modal-box{
  background:white;
  margin:18% auto;
  padding:20px;
  width:300px;
  border-radius:10px;
  text-align:center;
}
.modal-box input{
  width:80%;
}
#platform{
  display:none;
  padding:20px;
}
.panel{
  display:none;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.95);
  border-radius:12px;
  width:90%;
  max-width:1000px;
}
.label-sheet{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:20px;
}
.label{
  border:1px solid #000;
  background:white;
  height:100px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:14px;
  padding:4px;
}
.barcode-text{
  font-family:monospace;
  letter-spacing:1px;
  font-size:14px;
  margin-top:4px;
}
.warn{
  color:red;
  font-weight:bold;
}
.sub-box{
  margin:15px auto;
  padding:15px;
  background:#f7fbff;
  border:1px solid #b9d7ec;
  border-radius:10px;
  max-width:900px;
}
@media print{
  header,.no-print,.modal,.section,#stockArea,#logArea,#mainButtons{
    display:none !important;
  }
  body{background:white}
  #platform{
    display:block !important;
    padding:0 !important;
  }
  #stockInPanel{
    display:block !important;
    width:100% !important;
    max-width:none !important;
    margin:0 !important;
    padding:0 !important;
    background:white !important;
    border:none !important;
  }
  #labels{
    display:grid !important;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    padding:0;
  }
}
</style>
</head>
<body>

<!-- 首頁 -->
<div id="publicSite">
  <header>
    <h2>Betta Inline Skate Club</h2>
    <div>
      <button id="topLoginBtn" class="login-btn" onclick="openLogin()">登入</button>
    </div>
  </header>

  <div class="section hero">
    <div class="hero-left">
      <h1>鬥魚直排輪俱樂部</h1>
      <p style="font-size:18px;">專業直排輪教學｜競速訓練｜活動推廣</p>
    </div>
    <div class="hero-right">
      <img src="https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/489273120_1158160336323914_4604643340299191214_n.jpg?_nc_cat=107&ccb=1-7&_nc_sid=2a1932&_nc_ohc=4tb2Q1eRKiMQ7kNvwExyLxP&_nc_oc=AdojpYWHiGp8sWkLYtxKTPltRg-64wxWt0Prsbs_LRuYQcVpIq-j6nBmTHyCfDM-z1o&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=Cw4JR0LFozvt3FdCpuXkjA&_nc_ss=7a32e&oh=00_Afz5DPyVYjNyr1Rvy4DZi1jPeTCc09lLppYbosjIn9eaNw&oe=69C88C7A">
    </div>
  </div>

  <div class="section" style="background:#90e0ef;">
    <h2>近期活動照片</h2>
    <div class="gallery">
      <img src="https://picsum.photos/300/200?1">
      <img src="https://picsum.photos/300/200?2">
      <img src="https://picsum.photos/300/200?3">
    </div>
  </div>

  <div class="section">
    <h2>官方粉絲專頁</h2>
    <a href="https://www.facebook.com/BettaInlineSkateClub" target="_blank">
      <button class="fb-btn">前往FB</button>
    </a>
  </div>
</div>

<!-- 登入視窗 -->
<div id="loginModal" class="modal">
  <div class="modal-box">
    <h3>教練登入</h3>
    <input type="text" id="accountInput" placeholder="帳號，例如 jerry">
    <br>
    <input type="password" id="modalPass" placeholder="輸入密碼">
    <br>
    <button class="big-btn" onclick="login()">登入</button>
    <button class="small-btn" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- 裝備平台 -->
<div id="platform">
  <h2>裝備平台</h2>
  <h3 id="welcome"></h3>

  <div id="mainButtons" class="no-print">
    <button class="big-btn" onclick="openStockIn()">📦 進貨</button>
    <button class="big-btn" onclick="openStockOut()">📤 出貨</button>
    <button class="big-btn" onclick="showStock()">📋 查看庫存</button>
    <button class="big-btn" onclick="exportExcel()">💾 匯出 Excel</button>
    <button class="big-btn" onclick="logout()">🚪 登出</button>
  </div>

  <!-- 進貨：含新增商品＋條碼貼紙 -->
  <div id="stockInPanel" class="panel">
    <h3 class="no-print">📦 進貨管理</h3>

    <div class="sub-box no-print">
      <h4>➕ 新增商品</h4>
      <input id="newItemName" placeholder="商品名稱，例如 梅花帽">
      <input id="newItemCode" placeholder="商品簡碼，例如 MH">
      <button class="big-btn" onclick="addNewItem()">新增商品</button>
      <p>格式建議：簡碼用英文大寫，例如 MH / GL / SK</p>
    </div>

    <div class="sub-box no-print">
      <h4>1. 選擇商品</h4>
      <div id="productButtons"></div>

      <div id="sizePanel" style="display:none;margin-top:20px;">
        <h4>2. 選擇尺寸</h4>
        <button class="small-btn" onclick="chooseSize('XS')">XS</button>
        <button class="small-btn" onclick="chooseSize('S')">S</button>
        <button class="small-btn" onclick="chooseSize('M')">M</button>
        <button class="small-btn" onclick="chooseSize('L')">L</button>
        <button class="small-btn" onclick="chooseSize('XL')">XL</button>
        <button class="small-btn" onclick="chooseSize('F')">FREE</button>
      </div>

      <div id="qtyPanel" style="display:none;margin-top:20px;">
        <h4>3. 輸入數量</h4>
        <input type="number" id="inQty" min="1" value="1" placeholder="數量">
        <button class="big-btn" onclick="generateStockInBatch()">確認進貨並產生貼紙</button>
      </div>
    </div>

    <h3 id="result"></h3>

    <div id="printActions" class="no-print" style="display:none;">
      <button class="big-btn" onclick="window.print()">🖨️ 列印貼紙</button>
    </div>

    <div id="labels" class="label-sheet"></div>
  </div>

  <!-- 出貨 -->
  <div id="stockOutPanel" class="panel no-print">
    <h3>📤 出貨</h3>
    <input id="outCode" placeholder="輸入條碼，例如 MH-XS0001">
    <button class="big-btn" onclick="stockOut()">確認出貨</button>
  </div>

  <div id="stockArea" class="panel"></div>
  <div id="logArea" class="panel"></div>
</div>

<script>
var users={
  "jerry":{password:"0606",name:"佳祐"},
  "msmdick":{password:"1111",name:"土豆教練"},
  "h072012":{password:"2222",name:"小宇教練"},
  "zemo":{password:"3333",name:"阿澤教練"},
  "ma":{password:"5555",name:"小馬教練"},
  "chuu":{password:"6666",name:"莉筑教練"}
};

var products = {
  "MH":"梅花帽",
  "GL":"護具",
  "SK":"直排輪鞋"
};

var currentUserKey="";
var currentUserName="";
var isAdmin=false;
var currentProduct="";
var currentName="";
var currentSize="";
var barcodeCounter={};
var stock={};
var logs=[];

function openLogin(){
  document.getElementById("accountInput").value="";
  document.getElementById("modalPass").value="";
  document.getElementById("loginModal").style.display="block";
}

function closeModal(){
  document.getElementById("loginModal").style.display="none";
}

function login(){
  var account=document.getElementById("accountInput").value.trim();
  var pass=document.getElementById("modalPass").value;

  if(!users[account]){
    alert("查無此帳號");
    return;
  }
  if(users[account].password!==pass){
    alert("密碼錯誤");
    return;
  }

  currentUserKey=account;
  currentUserName=users[account].name;
  isAdmin=(account==="jerry");

  document.getElementById("loginModal").style.display="none";
  document.getElementById("publicSite").style.display="none";
  document.getElementById("platform").style.display="block";
  document.getElementById("welcome").innerText="✅ 歡迎登入，"+currentUserName;

  renderProductButtons();
}

function logout(){
  location.reload();
}

function hidePanels(){
  ["stockInPanel","stockOutPanel","stockArea","logArea"].forEach(function(id){
    document.getElementById(id).style.display="none";
  });
}

function openStockIn(){
  if(!isAdmin) return alert("❌ 只有佳祐可以進貨");
  hidePanels();
  document.getElementById("stockInPanel").style.display="block";
  document.getElementById("sizePanel").style.display="none";
  document.getElementById("qtyPanel").style.display="none";
  document.getElementById("printActions").style.display="none";
  document.getElementById("result").innerHTML="";
  document.getElementById("labels").innerHTML="";
}

function openStockOut(){
  hidePanels();
  document.getElementById("stockOutPanel").style.display="block";
}

function renderProductButtons(){
  var box=document.getElementById("productButtons");
  box.innerHTML="";
  for(var code in products){
    box.innerHTML += '<button class="small-btn" onclick="chooseProduct(\''+code+'\',\''+products[code]+'\')">'+products[code]+'</button>';
  }
}

function addNewItem(){
  if(!isAdmin) return alert("❌ 只有佳祐可以新增商品");
  var name=document.getElementById("newItemName").value.trim();
  var code=document.getElementById("newItemCode").value.trim().toUpperCase();

  if(!name || !code) return alert("請輸入商品名稱與商品簡碼");
  if(products[code]) return alert("❌ 這個商品簡碼已存在");

  products[code]=name;
  document.getElementById("newItemName").value="";
  document.getElementById("newItemCode").value="";
  renderProductButtons();
  alert("✅ 商品新增成功");
}

function chooseProduct(code,name){
  currentProduct=code;
  currentName=name;
  currentSize="";
  document.getElementById("sizePanel").style.display="block";
  document.getElementById("qtyPanel").style.display="none";
}

function chooseSize(size){
  currentSize=size;
  document.getElementById("qtyPanel").style.display="block";
}

function generateStockInBatch(){
  if(!isAdmin) return alert("❌ 只有佳祐可以進貨");
  var qty=parseInt(document.getElementById("inQty").value||"0",10);
  if(!currentProduct || !currentName || !currentSize) return alert("請先選商品與尺寸");
  if(!qty || qty<1) return alert("請輸入正確數量");

  var key=currentProduct+"-"+currentSize;
  if(!barcodeCounter[key]) barcodeCounter[key]=1;

  var container=document.getElementById("labels");
  container.innerHTML="";

  var firstCode="", lastCode="";
  for(var i=0;i<qty;i++){
    var num=barcodeCounter[key].toString().padStart(4,'0');
    var newCode=currentProduct+"-"+currentSize+num;

    if(i===0) firstCode=newCode;
    lastCode=newCode;

    stock[newCode]={
      productCode: currentProduct,
      productName: currentName,
      size: currentSize,
      inTime: new Date().toLocaleString()
    };

    var div=document.createElement("div");
    div.className="label";
    div.innerHTML=
      '<div><b>'+currentName+'</b></div>'+
      '<div>'+currentSize+'</div>'+
      '<div class="barcode-text">'+newCode+'</div>';
    container.appendChild(div);

    barcodeCounter[key]++;
  }

  document.getElementById("result").innerHTML=
    "✅ 進貨成功<br>物品："+currentName+"<br>尺寸："+currentSize+"<br>數量："+qty+
    "<br>條碼範圍："+firstCode+" ～ "+lastCode;

  document.getElementById("printActions").style.display="block";
  showStock();
}

function stockOut(){
  var code=document.getElementById("outCode").value.trim().toUpperCase();
  if(!stock[code]) return alert("❌ 查無此條碼或已出貨");

  var item=stock[code];
  delete stock[code];

  logs.push({
    user: currentUserName,
    product: item.productName,
    size: item.size,
    code: code,
    time: new Date().toLocaleString()
  });

  alert("📤 出貨成功\n物品："+item.productName+"\n尺寸："+item.size+"\n條碼："+code);
  document.getElementById("outCode").value="";
  showStock();
}

function showStock(){
  hidePanels();
  document.getElementById("stockArea").style.display="block";
  document.getElementById("logArea").style.display="block";

  var summary={};
  for(var code in stock){
    var item=stock[code];
    var key=item.productName+"__"+item.size;
    if(!summary[key]) summary[key]=0;
    summary[key]++;
  }

  var html='<h3>📋 目前庫存</h3><table><tr><th>物品</th><th>尺寸</th><th>現有庫存</th><th>警告</th></tr>';
  for(var key in summary){
    var parts=key.split("__");
    var qty=summary[key];
    html+='<tr><td>'+parts[0]+'</td><td>'+parts[1]+'</td><td>'+qty+'</td><td>'+(qty<=3?'<span class="warn">⚠️ 低庫存</span>':'')+'</td></tr>';
  }
  if(Object.keys(summary).length===0){
    html+='<tr><td colspan="4">目前沒有庫存</td></tr>';
  }
  html+='</table>';

  html+='<h3>🏷️ 條碼明細</h3><table><tr><th>物品</th><th>尺寸</th><th>條碼</th><th>進貨時間</th></tr>';
  for(var code in stock){
    var item=stock[code];
    html+='<tr><td>'+item.productName+'</td><td>'+item.size+'</td><td>'+code+'</td><td>'+item.inTime+'</td></tr>';
  }
  if(Object.keys(stock).length===0){
    html+='<tr><td colspan="4">沒有條碼庫存</td></tr>';
  }
  html+='</table>';

  document.getElementById("stockArea").innerHTML=html;
  showLog();
}

function showLog(){
  var html='<h3>📝 出貨紀錄</h3><table><tr><th>出貨教練</th><th>物品</th><th>尺寸</th><th>條碼</th><th>時間</th></tr>';
  logs.forEach(function(l){
    html+='<tr><td>'+l.user+'</td><td>'+l.product+'</td><td>'+l.size+'</td><td>'+l.code+'</td><td>'+l.time+'</td></tr>';
  });
  if(logs.length===0){
    html+='<tr><td colspan="5">目前沒有出貨紀錄</td></tr>';
  }
  html+='</table>';
  document.getElementById("logArea").innerHTML=html;
}

function exportExcel(){
  var stockData=[["物品","尺寸","條碼","進貨時間"]];
  for(var code in stock){
    var item=stock[code];
    stockData.push([item.productName,item.size,code,item.inTime]);
  }

  var logData=[["出貨教練","物品","尺寸","條碼","時間"]];
  logs.forEach(function(l){
    logData.push([l.user,l.product,l.size,l.code,l.time]);
  });

  var wb=XLSX.utils.book_new();
  var ws1=XLSX.utils.aoa_to_sheet(stockData);
  XLSX.utils.book_append_sheet(wb,ws1,"目前庫存");
  var ws2=XLSX.utils.aoa_to_sheet(logData);
  XLSX.utils.book_append_sheet(wb,ws2,"出貨紀錄");
  XLSX.writeFile(wb,"裝備平台報表.xlsx");
}
</script>

</body>
</html>
</html>
